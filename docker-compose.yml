services:
  postgres:
    restart: always
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: atuin
      POSTGRES_USER: atuin
      POSTGRES_PASSWORD: atuin_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atuin']
      interval: 10s
      timeout: 5s
      retries: 5

  atuin:
    restart: always
    image: ghcr.io/atuinsh/atuin:18.3.0
    command: server start
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - "./config:/config"
    ports:
      - 8888:8888
    environment:
      ATUIN_HOST: "0.0.0.0"
      ATUIN_OPEN_REGISTRATION: "true"
      ATUIN_DB_URI: postgres://atuin:atuin_password@postgres/atuin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
